<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern EMI Calculator</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .container {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 15px;
        padding: 30px;
        width: 350px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        color: white;
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
        font-size: 24px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-radius: 8px;
        outline: none;
        font-size: 14px;
    }

    input:focus {
        transform: scale(1.02);
        transition: 0.2s;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        background: #ffffff;
        color: #333;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #f1f1f1;
        transform: scale(1.03);
    }

    .result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
    }

    .tag {
        font-size: 12px;
        margin-bottom: 10px;
        opacity: 0.8;
    }
</style>
</head>

<body>

<div class="container">
    <h1>💰 EMI Calculator</h1>
    <div class="tag">Modern Finance Tool</div>

    <input type="number" id="p" placeholder="Loan Amount (₹)">
    <input type="number" id="r" placeholder="Interest Rate (%)">
    <input type="number" id="t" placeholder="Time (Years)">

    <button onclick="calculateEMI()">Calculate EMI</button>

    <div class="result" id="result"></div>
</div>

<script>
function calculateEMI() {
    let p = parseFloat(document.getElementById("p").value);
    let r = parseFloat(document.getElementById("r").value) / 12 / 100;
    let t = parseFloat(document.getElementById("t").value) * 12;

    if (!p || !r || !t) {
        document.getElementById("result").innerHTML =
            "⚠️ Please enter all values";
        return;
    }

    let emi = (p * r * Math.pow(1 + r, t)) /
              (Math.pow(1 + r, t) - 1);

    document.getElementById("result").innerHTML =
        "📊 Monthly EMI: ₹ " + emi.toFixed(2);
}
</script>

</body>
</html>
